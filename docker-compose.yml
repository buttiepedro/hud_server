services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./certs:/app/certs:ro
    networks:
      - hud-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hud-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hud.rule=Host(`hud.example.com`)"
      - "traefik.http.routers.hud.entrypoints=websecure"
      - "traefik.http.routers.hud.tls=true"
      - "traefik.http.services.hud.loadbalancer.server.port=80"
      # Disable proxy buffering for SSE stream
      - "traefik.http.middlewares.hud-sse.headers.customResponseHeaders.X-Accel-Buffering=no"
      - "traefik.http.routers.hud.middlewares=hud-sse"

networks:
  hud-net:
    driver: bridge
