services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./certs:/app/certs:ro
      - ./data:/app/data
    networks:
      - hud-net
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "${HUD_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hud-net
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hud.rule=Host(`${HUD_DOMAIN}`)"
      - "traefik.http.routers.hud.entrypoints=${TRAEFIK_ENTRYPOINT:-web}"
      - "traefik.http.services.hud.loadbalancer.server.port=80"
      - "traefik.http.middlewares.hud-sse.headers.customResponseHeaders.X-Accel-Buffering=no"
      - "traefik.http.routers.hud.middlewares=hud-sse"

networks:
  hud-net:
    driver: bridge
  proxy:
    external: true
